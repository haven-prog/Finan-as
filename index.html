<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0a08" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Casal Finance</title>
    
    <link rel="manifest" href="/manifest.json" /> 
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <style>
      /* Reset básico para mobile */
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: #0c0a08;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        /* Permite o scroll se a lista de gastos for grande */
        overflow-y: auto; 
        overflow-x: hidden;
        /* IMPORTANTE: Removi o user-select: none para você conseguir clicar nos campos */
        touch-action: manipulation;
      }

      /* Ajuste para inputs não darem zoom errado no iPhone */
      input, select, button {
        font-size: 16px !important;
        user-select: auto !important;
        -webkit-user-select: auto !important;
      }

      /* Previne comportamentos estranhos de segurar o dedo no iOS */
      #root {
        -webkit-touch-callout: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
